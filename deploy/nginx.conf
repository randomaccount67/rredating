# RRedating API — Nginx Reverse Proxy Configuration
# Place at: /etc/nginx/sites-available/api.rredating.com
# Symlink: ln -s /etc/nginx/sites-available/api.rredating.com /etc/nginx/sites-enabled/

# M2 fix: Nginx-level rate limiting — defense-in-depth against pre-auth floods
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

server {
    listen 443 ssl http2;
    server_name api.rredating.com;

    # Cloudflare Origin CA certificate
    ssl_certificate     /etc/ssl/cloudflare/api.rredating.com.pem;
    ssl_certificate_key /etc/ssl/cloudflare/api.rredating.com.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Restrict to Cloudflare IPs only
    # Update periodically from https://www.cloudflare.com/ips-v4 and ips-v6
    # UFW/iptables rules should also enforce this
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 131.0.72.0/22;
    # Cloudflare IPv6 ranges
    set_real_ip_from 2400:cb00::/32;
    set_real_ip_from 2606:4700::/32;
    set_real_ip_from 2803:f800::/32;
    set_real_ip_from 2405:b500::/32;
    set_real_ip_from 2405:8100::/32;
    set_real_ip_from 2a06:98c0::/29;
    set_real_ip_from 2c0f:f248::/32;
    real_ip_header CF-Connecting-IP;

    # Security headers (M1 + L3 fixes)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    # L3: Removed deprecated X-XSS-Protection — it can introduce vulnerabilities in modern browsers
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    location / {
        # M2: Apply rate limiting at the Nginx layer
        limit_req zone=api burst=50 nodelay;

        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;

        # Body size limit for avatar uploads (8MB + overhead)
        client_max_body_size 10M;
    }
}

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name api.rredating.com;
    return 301 https://$server_name$request_uri;
}
